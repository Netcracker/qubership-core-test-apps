<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" sizes="any"
          href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>"/>
    <title>Daily Integration Tests Report</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 20px;
            background: linear-gradient(to bottom right, #f0f4f8, #e2e8f0);
            color: #333;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #4f46e5;
        }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            background: white;
        }

        th, td {
            padding: 12px 16px;
            text-align: center;
        }

        th {
            background: #4f46e5;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:nth-child(even) td {
            background: #f7f9fc;
        }

        tr:hover td {
            background: #e0e7ff;
            transition: background 0.3s;
        }

        .success-cell {
            background: #16a34a;
            color: white;
            font-weight: 500;
            border-radius: 6px;
            padding: 6px;
        }

        .failure-cell {
            background: #dc2626;
            color: white;
            font-weight: 500;
            border-radius: 6px;
            padding: 6px;
        }

        a .success-cell, a .failure-cell {
            color: white;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }
    </style>
</head>
<body>
<h1>Daily Integration Tests Report</h1>

<table id="reportTable"></table>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        fetch('history.json')
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById('reportTable');
                const dates = [];

                // Gather all unique project names
                const projects = new Set();
                Object.values(data).forEach(dayEntry => {
                    if (dayEntry.projects) {
                        dayEntry.projects.forEach(p => projects.add(p.name));
                    }
                });
                const projectList = [...projects].sort();

                // Last 7 days newest → oldest (left → right)
                for (let i = 0; i <= 6; i++) {
                    const d = new Date();
                    d.setUTCDate(d.getUTCDate() - i);
                    dates.push(d.toISOString().slice(0, 10));
                }

                const today = new Date().toISOString().slice(0, 10);

                // ---- Header ----
                const header = document.createElement('tr');
                const headerHtml = ['<th>Project</th>'];
                dates.forEach(day => {
                    let dayFailed = false;
                    const dayEntry = data[day];

                    if (dayEntry && dayEntry.projects) {
                        for (const p of dayEntry.projects) {
                            if (p.failures > 0) dayFailed = true;
                        }
                    }

                    const warning = dayFailed ? ' ⚠️' : '';
                    headerHtml.push(`<th>${day}${warning}</th>`);
                });
                header.innerHTML = headerHtml.join('');
                table.appendChild(header);

                // ---- Rows ----
                const jobUrlToday = data[today] && data[today].job ? data[today].job : null;

                projectList.forEach(project => {
                    const row = document.createElement('tr');

                    // Project name cell
                    const projectCell = document.createElement('td');
                    if (jobUrlToday) {
                        const link = document.createElement('a');
                        link.href = jobUrlToday;
                        link.target = "_blank";
                        link.textContent = project;
                        link.style.fontWeight = "600";
                        link.style.color = "#4f46e5";
                        link.style.textDecoration = "none";
                        projectCell.appendChild(link);
                    } else {
                        projectCell.textContent = project;
                    }
                    row.appendChild(projectCell);

                    // Day cells
                    dates.forEach(day => {
                        const cell = document.createElement('td');
                        const dayEntry = data[day];
                        const entry = dayEntry && dayEntry.projects
                            ? dayEntry.projects.find(p => p.name === project) || null
                            : null;

                        if (entry) {
                            const cls = entry.failures > 0 ? 'failure-cell' : 'success-cell';
                            const text = `✔️ ${entry.successes} / ⚠️ ${entry.failures}`;
                            const jobUrl = dayEntry.job || null;

                            const span = document.createElement('span');
                            span.className = cls;
                            span.textContent = text;

                            const href = day === today ? entry.path + 'index.html' : jobUrl;
                            if (href) {
                                const link = document.createElement('a');
                                link.href = href;
                                link.target = '_blank';
                                link.appendChild(span);
                                cell.appendChild(link);
                            } else {
                                cell.appendChild(span);
                            }
                        } else {
                            cell.textContent = '-';
                        }

                        row.appendChild(cell);
                    });

                    table.appendChild(row);
                });
            })
            .catch(err => {
                const table = document.getElementById('reportTable');
                table.innerHTML = '<tr><td>Failed to load report data.</td></tr>';
                console.error('Failed to load history.json', err);
            });
    });
</script>

</body>
</html>
