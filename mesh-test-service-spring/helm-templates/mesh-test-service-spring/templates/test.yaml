---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mesh-test-service-spring-public-routes
  labels:
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/name: '{{ .Values.SERVICE }}' # needed for finalyzer check
    app.kubernetes.io/processed-by-operator: "core-operator" # name of operator
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}' # needed for finalyzer check
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: public-gateway-service
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/mesh-test-service-spring/declarative_hello
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v1/declarative_hello
    backendRefs:
    - kind: Service
      name: "{{ .Values.DEPLOYMENT_RESOURCE_NAME }}"
      port: 8080.0
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mesh-test-app-gateway-spring-routes
  labels:
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/name: '{{ .Values.SERVICE }}' # needed for finalyzer check
    app.kubernetes.io/processed-by-operator: "core-operator" # name of operator
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}' # needed for finalyzer check
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: mesh-test-app-gateway
  hostnames:
  - "{{ .Values.SERVICE }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/mesh-test-service-spring/hello
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v1/hello
    backendRefs:
    - kind: Service
      name: "{{ .Values.DEPLOYMENT_RESOURCE_NAME }}"
      port: 8080.0
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/mesh-test-service-spring/declarative_hello
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v1/declarative_hello
    backendRefs:
    - kind: Service
      name: "{{ .Values.DEPLOYMENT_RESOURCE_NAME }}"
      port: 8080.0
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/mesh-test-service-spring/egress
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v1/egress
    backendRefs:
    - kind: Service
      name: "{{ .Values.DEPLOYMENT_RESOURCE_NAME }}"
      port: 8080.0
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/mesh-test-service-spring/sleep
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v1/sleep
    backendRefs:
    - kind: Service
      name: "{{ .Values.DEPLOYMENT_RESOURCE_NAME }}"
      port: 8080.0
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: egress-routes-spring-control-plane-routes
  labels:
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/name: '{{ .Values.SERVICE }}' # needed for finalyzer check
    app.kubernetes.io/processed-by-operator: "core-operator" # name of operator
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}' # needed for finalyzer check
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: egress-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v3/control-plane/versions/registry
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v3/versions/registry
    - type: RequestHeaderModifier
      requestHeaderModifier:
        remove:
        - Origin
    backendRefs:
    - kind: Service
      name: control-plane
      port: 8080.0
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: egress-routes-spring
  labels:
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/name: '{{ .Values.SERVICE }}' # needed for finalyzer check
    app.kubernetes.io/processed-by-operator: "core-operator" # name of operator
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}' # needed for finalyzer check
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: egress-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/mesh-test-service-spring/sleep
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /api/v1/sleep
    - type: RequestHeaderModifier
      requestHeaderModifier:
        remove:
        - Origin
    backendRefs:
    - kind: Service
      name: "{{ .Values.DEPLOYMENT_RESOURCE_NAME }}"
      port: 8080.0
