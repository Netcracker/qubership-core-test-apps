name: Run integration tests

on:
  workflow_call:
    inputs:
      core-bootstrap-branch:
        description: 'Branch of core-bootstrap repo'
        required: false
        default: 'main'
        type: string
      install-maas:
        description: 'Install MaaS'
        required: false
        default: false
        type: boolean
      install-istio:
        description: 'Install Istio'
        required: false
        default: false
        type: boolean
      istio-repo-branch:
        description: 'Branch of the Istio repo'
        required: false
        default: 'main'
        type: string
      core-mesh-config-repo-branch:
        description: 'Branch of the Core Mesh Config repo'
        required: false
        default: 'main'
        type: string
      dummy-separator-0:
        description: '--------------------------------'
        required: false
        default: 'Docker image tags for core components'
        type: string      
      facade-operator-tag:
        description: 'Docker image tag for Facade Operator'
        required: false
        default: 'latest'
        type: string
      ingress-gateway-tag:
        description: 'Docker image tag for Ingress Gateway'
        required: false
        default: 'latest'
        type: string
      control-plane-tag:
        description: 'Docker image tag for Control Plane'
        required: false
        default: 'latest'
        type: string
      paas-mediation-tag:
        description: 'Docker image tag for PaaS Mediation'
        required: false
        default: 'latest'
        type: string
      dbaas-agent-tag:
        description: 'Docker image tag for DBaaS Agent'
        required: false
        default: 'latest'
        type: string
      core-operator-tag:
        description: 'Docker image tag for Core Operator'
        required: false
        default: 'latest'
        type: string
      config-server-tag:
        description: 'Docker image tag for Config Server'
        required: false
        default: 'latest'
        type: string
      site-management-tag:
        description: 'Docker image tag for Site Management'
        required: false
        default: 'latest'
        type: string
      dummy-separator:
        description: '--------------------------------'
        required: false
        default: 'Mesh test services tags'
        type: string
      mesh-test-spring-tag:
        description: 'Docker image tag for Mesh test Spring service'
        required: false
        default: 'latest'
        type: string
      mesh-test-quarkus-tag:  
        description: 'Docker image tag for Mesh test Quarkus service'
        required: false
        default: 'latest'
        type: string
      mesh-test-go-tag:
        description: 'Docker image tag for Mesh test Go service'
        required: false
        default: 'latest'
        type: string        
      dummy-separator-2:
        description: '--------------------------------'
        required: false
        default: 'Run integration tests'
        type: string
      mesh-type:
        description: 'Mesh type for test services — CORE or ISTIO'
        required: false
        default: 'CORE'
        type: string
      run-mesh:
        description: 'Run mesh integration tests'
        required: false
        default: true
        type: boolean
      mesh-test-usecase:
        type: string
        required: false
        description: Rename `mesh-integration-tests` folder to alias name - to distiguish mesh test modes in report        
      run-paas:
        description: 'Run paas-mediation integration tests'
        required: false
        default: true
        type: boolean

  workflow_dispatch:
    inputs:
      core-bootstrap-branch:
        description: 'Branch of core-bootstrap repo'
        required: false
        default: 'main'
        type: string
      install-maas:
        description: 'Install MaaS'
        required: false
        default: false
        type: boolean
      install-istio:
        description: 'Install Istio'
        required: false
        default: false
        type: boolean
      istio-repo-branch:
        description: 'Branch of the Istio repo'
        required: false
        default: 'main'
        type: string
      core-mesh-config-repo-branch:
        description: 'Branch of the Core Mesh Config repo'
        required: false
        default: 'main'
        type: string
      dummy-separator-0:
        description: '--------------------------------'
        required: false
        default: 'Docker image tags for core components'
        type: string      
      facade-operator-tag:
        description: 'Docker image tag for Facade Operator'
        required: false
        default: 'latest'
        type: string
      ingress-gateway-tag:
        description: 'Docker image tag for Ingress Gateway'
        required: false
        default: 'latest'
        type: string
      control-plane-tag:
        description: 'Docker image tag for Control Plane'
        required: false
        default: 'latest'
        type: string
      paas-mediation-tag:
        description: 'Docker image tag for PaaS Mediation'
        required: false
        default: 'latest'
        type: string
      dbaas-agent-tag:
        description: 'Docker image tag for DBaaS Agent'
        required: false
        default: 'latest'
        type: string
      core-operator-tag:
        description: 'Docker image tag for Core Operator'
        required: false
        default: 'latest'
        type: string
      config-server-tag:
        description: 'Docker image tag for Config Server'
        required: false
        default: 'latest'
        type: string
      site-management-tag:
        description: 'Docker image tag for Site Management'
        required: false
        default: 'latest'
        type: string
      dummy-separator:
        description: '--------------------------------'
        required: false
        default: 'Mesh test services tags'
        type: string
      mesh-test-spring-tag:
        description: 'Docker image tag for Mesh test Spring service'
        required: false
        default: 'latest'
        type: string
      mesh-test-quarkus-tag:  
        description: 'Docker image tag for Mesh test Quarkus service'
        required: false
        default: 'latest'
        type: string
      mesh-test-go-tag:
        description: 'Docker image tag for Mesh test Go service'
        required: false
        default: 'latest'
        type: string        
      dummy-separator-2:
        description: '--------------------------------'
        required: false
        default: 'Run integration tests'
        type: string
      mesh-type:
        description: 'Mesh type for test services — CORE or ISTIO'
        required: false
        default: 'CORE'
        type: string
      run-mesh:
        description: 'Run mesh integration tests'
        required: false
        default: true
        type: boolean
      mesh-test-usecase:
        type: string
        required: false
        description: Rename `mesh-integration-tests` folder to alias name - to distiguish mesh test modes in report        
      run-paas:
        description: 'Run paas-mediation integration tests'
        required: false
        default: true
        type: boolean

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Kind cluster and deploy Cloud Core
        uses: ./.github/actions/setup-kind-with-cloud-core
        with:
          core-bootstrap-branch: ${{ inputs.core-bootstrap-branch }}
          install-maas: ${{ inputs.install-maas || 'false' }}
          install-istio: ${{ inputs.install-istio || 'false' }}
          istio-repo-branch: ${{ inputs.istio-repo-branch }}
          core-mesh-config-repo-branch: ${{ inputs.core-mesh-config-repo-branch }}
          facade-operator-tag: ${{ inputs.facade-operator-tag || 'latest' }}
          ingress-gateway-tag: ${{ inputs.ingress-gateway-tag || 'latest' }}
          control-plane-tag: ${{ inputs.control-plane-tag || 'latest' }}
          paas-mediation-tag: ${{ inputs.paas-mediation-tag || 'latest' }}
          dbaas-agent-tag: ${{ inputs.dbaas-agent-tag || 'latest' }}
          core-operator-tag: ${{ inputs.core-operator-tag || 'latest' }}
          config-server-tag: ${{ inputs.config-server-tag || 'latest' }}
          site-management-tag: ${{ inputs.site-management-tag || 'latest' }}

      - name: preserve-cpu-resources-workaround
        run: |
          # to preserve some resources for tests
          helm uninstall site-management config-server -n core 

      - name: Run mesh integration tests (test apps in ${{ inputs.mesh-type || 'CORE' }} mesh mode)
        id: mesh_tests
        if: inputs.run-mesh
        continue-on-error: true
        uses: ./.github/actions/run-mesh-tests
        with:
          mesh-type: ${{ inputs.mesh-type || 'CORE' }}
          spring-tag: ${{ inputs.mesh-test-spring-tag || 'latest' }}
          quarkus-tag: ${{ inputs.mesh-test-quarkus-tag || 'latest' }}
          go-tag: ${{ inputs.mesh-test-go-tag || 'latest' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename mesh integration tests folder
        if: inputs.mesh-test-usecase
        run: |
          mv mesh-integration-tests ${{ inputs.mesh-test-usecase }}

      - name: Checkout paas-mediation
        if: inputs.run-paas
        uses: actions/checkout@v4
        with:
          repository: Netcracker/qubership-core-paas-mediation
          path: repos/paas-mediation 
        
      - name: Run paas-mediation integration tests
        id: paas_tests
        if: inputs.run-paas
        continue-on-error: true
        run: |
          ./run-it/run-integration-tests.sh kind-kind core kind-control-plane:10.244.0.1 paas-mediation-tests:repos/paas-mediation/integration-tests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Aggregate Surefire reports
        run: |
          for module in $(find . -type d -path "*/target/surefire-reports" | sed -E 's#/target/surefire-reports##' | sort -u); do
            
          # Naming strategy: if path starts with ./repos/, take third item (repo name), otherwise use basename
            if [[ "$module" == ./repos/* ]]; then
              modname=$(echo "$module" | cut -d'/' -f3)
            else
              modname=$(basename "$module")
            fi
            echo "Found test reports for module: $module -> artifact: $modname"
            mkdir -p artifacts/$modname
            cp -r "$module/target/surefire-reports" artifacts/$modname/ || true
            if [ -d "$module/target/reports" ]; then
              cp -r "$module/target/reports" artifacts/$modname/ || true
            fi
          done

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.mesh-test-usecase || 'surefire-reports' }}
          path: artifacts/*

      - name: Upload Istio logs
        if: ${{ (failure() || steps.mesh_tests.outcome == 'failure' || steps.paas_tests.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: istio-logs
          path: |
            ./core-bootstrap-repo/cloud-core-local-dev/istio/test/istio-logs

      - name: Collect Kubernetes diagnostics
        if: ${{ failure() || steps.mesh_tests.outcome == 'failure' || steps.paas_tests.outcome == 'failure' }}
        run: |
          set +e

          echo "==== Collecting cluster state ===="

          {
            echo "==== CLUSTER INFO ===="
            kubectl version --short || true
            kubectl cluster-info || true

            echo
            echo "==== NODES ===="
            kubectl get nodes -o wide || true

            echo
            echo "==== PODS (ALL NAMESPACES) ===="
            kubectl get pods -A -o wide || true

            echo
            echo "==== DEPLOYMENTS ===="
            kubectl get deployments -A || true

            echo
            echo "==== HTTPROUTES ===="
            kubectl get httproute -A -o yaml|| true

            echo
            echo "==== EVENTS (CHRONOLOGICAL) ===="
            kubectl get events -A --sort-by=.metadata.creationTimestamp || true

            echo
            echo "==== KIND CLUSTER ===="
            kind get clusters || true
            docker ps -a --filter "name=kind" || true

            echo
            echo "==== KIND CONTROL PLANE LOGS ===="
            docker logs kind-control-plane || true

            echo
            echo "==== KUBELET LOGS ===="
            docker exec kind-control-plane journalctl -u kubelet --no-pager || true

          } > cluster-state.txt 2>&1


          echo "==== Collecting unhealthy pod logs ===="

          {
            kubectl get pods -A \
              -o jsonpath='{range .items[?(@.status.phase!="Running" && @.status.phase!="Succeeded")]}{.metadata.namespace} {.metadata.name} {.status.phase}{"\n"}{end}' \
              > /tmp/unhealthy-pods.txt || true

            if [ ! -s /tmp/unhealthy-pods.txt ]; then
              echo "No unhealthy pods found"
            fi

            while read -r ns pod phase; do
              echo
              echo "################################################"
              echo "# Pod: $pod"
              echo "# Namespace: $ns"
              echo "# Phase: $phase"
              echo "################################################"

              echo
              echo "---- kubectl describe ----"
              kubectl describe pod "$pod" -n "$ns" || true

              echo
              echo "---- container logs ----"
              for c in $(kubectl get pod "$pod" -n "$ns" -o jsonpath='{.spec.containers[*].name}' 2>/dev/null); do
                echo
                echo "-- logs for container: $c"
                kubectl logs -n "$ns" "$pod" -c "$c" --tail=200 || true

                echo
                echo "-- previous logs for container: $c"
                kubectl logs -n "$ns" "$pod" -c "$c" --previous --tail=200 || true
              done
            done < /tmp/unhealthy-pods.txt

          } > unhealthy-pods-logs.txt 2>&1
      
      - name: Upload Kubernetes diagnostics
        if: ${{ failure() || steps.mesh_tests.outcome == 'failure' || steps.paas_tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: kind-k8s-debug${{ inputs.mesh-test-usecase != '' && format('-{0}', inputs.mesh-test-usecase) || '' }}
          path: |
            cluster-state.txt
            unhealthy-pods-logs.txt